name: Bug report
description: Something is wrong with codeglance
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out this form as completely as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: How to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `npx codeglance /path/to/repo`
        2. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: |
        - codeglance version (`npx codeglance --version`)
        - Node.js version (`node --version`)
        - OS
        - Repo type (Node/Go/Rust/Python)
    validations:
      required: true
